          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]
    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]

    ReactionType:
      type: string
      enum: [like, love, care, haha, wow, sad, angry]

    Profile:
      type: object
      required: [id, username, displayName, isVerified, createdAt]
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        coverUrl: { type: ["string", "null"] }
        bio: { type: ["string", "null"] }
        birthday: { type: ["string", "null"] }
        location: { type: ["string", "null"] }
        work: { type: ["string", "null"] }
        education: { type: ["string", "null"] }
        hometown: { type: ["string", "null"] }
        hobbies: { type: ["string", "null"] }
        interests: { type: ["string", "null"] }
        website: { type: ["string", "null"] }
        isVerified: { type: boolean }
        createdAt: { type: string, format: date-time }
        usernameChangedAt: { type: ["string", "null"], format: date-time }
        displayNameChangedAt: { type: ["string", "null"], format: date-time }
        friendCount: { type: ["integer", "null"] }
        followerCount: { type: ["integer", "null"] }
        followingCount: { type: ["integer", "null"] }
        postCount: { type: ["integer", "null"] }
        viewerIsFriend: { type: ["boolean", "null"] }
        viewerHasPendingRequest: { type: ["boolean", "null"] }
        viewerFollows: { type: ["boolean", "null"] }
        viewerCanSendRequest: { type: ["boolean", "null"] }
        isLocked: { type: ["boolean", "null"] }
        presence:
          type: ["object", "null"]
          properties:
            status: { type: string }
            lastSeenAt: { type: ["string", "null"], format: date-time }
    FriendSuggestion:
      allOf:
        - $ref: "#/components/schemas/Profile"
        - type: object
          required: [mutualFriendsCount]
          properties:
            mutualFriendsCount: { type: integer }
    ProfileInput:
      type: object
      required: [id, username, displayName]
      properties:
        id: { type: string }
        username: { type: string, minLength: 1 }
        displayName: { type: string, minLength: 1 }
        email: { type: string }
        phone: { type: string }
        avatarUrl: { type: string }
    ProfileUpdate:
      type: object
      properties:
        username:
          {
            type: string,
            minLength: 3,
            maxLength: 30,
            pattern: "^[a-z0-9](?:[a-z0-9._]*[a-z0-9])?$",
          }
        displayName: { type: string, minLength: 1 }
        bio: { type: string }
        birthday: { type: string }
        avatarUrl: { type: string }
        coverUrl: { type: string }
        location: { type: string }
        work: { type: string }
        education: { type: string }
        hometown: { type: string }
        hobbies: { type: string }
        interests: { type: string }
        website: { type: string }
        email: { type: string }
        phone: { type: string }

    MediaItem:
      type: object
      required: [id, url, type]
      properties:
        id: { type: integer }
        url: { type: string }
        type: { type: string, enum: [image, video] }
        thumbnailUrl: { type: ["string", "null"] }
        width: { type: ["integer", "null"] }
        height: { type: ["integer", "null"] }
        durationMs: { type: ["integer", "null"] }
        position: { type: integer }
    MediaItemInput:
      type: object
      required: [url, type]
      properties:
        url: { type: string }
        type: { type: string, enum: [image, video] }
        thumbnailUrl: { type: string }
        width: { type: integer }
        height: { type: integer }
        durationMs: { type: integer }
        position: { type: integer }

    ReactionSummary:
      type: object
      required: [total, byType]
      properties:
        total: { type: integer }
        byType:
          type: object
          additionalProperties: { type: integer }
        viewerReaction:
          oneOf:
            - { $ref: "#/components/schemas/ReactionType" }
            - { type: "null" }
    PageRef:
      type: object
      description: Lightweight page identity used when a post/comment/reaction is made as a Page.
      required: [id, name]
      properties:
        id: { type: integer }
        name: { type: string }
        avatarUrl: { type: ["string", "null"] }
    ReactionInput:
      type: object
      required: [type]
      properties:
        type: { $ref: "#/components/schemas/ReactionType" }
        pageId:
          type: integer
          description: When set, react as this Page (must be owner/editor of the page).
    ReactionUser:
      type: object
      required: [user, type]
      properties:
        user: { $ref: "#/components/schemas/Profile" }
        type: { $ref: "#/components/schemas/ReactionType" }
        page:
          oneOf:
            - { $ref: "#/components/schemas/PageRef" }
            - { type: "null" }

    Post:
      type: object
      required: [id, author, content, privacy, commentsEnabled, reactionsEnabled, media, reactions, commentCount, shareCount, createdAt]
      properties:
        id: { type: integer }
        author: { $ref: "#/components/schemas/Profile" }
        authorPage:
          oneOf:
            - { $ref: "#/components/schemas/PageRef" }
            - { type: "null" }
        content: { type: string }
        feelingVerb: { type: ["string", "null"] }
        feeling: { type: ["string", "null"] }
        feelingEmoji: { type: ["string", "null"] }
        location: { type: ["string", "null"] }
        privacy: { type: string, enum: [public, friends, private] }
        commentsEnabled: { type: boolean }
        reactionsEnabled: { type: boolean }
        groupId: { type: ["integer", "null"] }
        pageId: { type: ["integer", "null"] }
        media:
          type: array
          items: { $ref: "#/components/schemas/MediaItem" }
        reactions: { $ref: "#/components/schemas/ReactionSummary" }
        commentCount: { type: integer }
        shareCount: { type: integer }
        viewerHasSaved: { type: boolean }
        poll:
          oneOf:
            - { $ref: "#/components/schemas/Poll" }
            - { type: "null" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Poll:
      type: object
      required: [id, question, totalVotes, options, viewerVotedOptionId]
      properties:
        id: { type: integer }
        question: { type: string }
        totalVotes: { type: integer }
        viewerVotedOptionId: { type: ["integer", "null"] }
        options:
          type: array
          items: { $ref: "#/components/schemas/PollOption" }
    PollOption:
      type: object
      required: [id, text, voteCount]
      properties:
        id: { type: integer }
        text: { type: string }
        voteCount: { type: integer }
    PollInput:
      type: object
      required: [question, options]
      properties:
        question: { type: string }
        options:
          type: array
          minItems: 2
          items: { type: string }
    PollVoteInput:
      type: object
      required: [optionId]
      properties:
        optionId: { type: integer }
    PostInput:
      type: object
      required: [content]
      properties:
        content: { type: string }
        feelingVerb: { type: string }
        feeling: { type: string }
        feelingEmoji: { type: string }
        location: { type: string }
        privacy: { type: string, enum: [public, friends, private] }
        groupId: { type: integer }
        pageId: { type: integer }
        media:
          type: array
          items: { $ref: "#/components/schemas/MediaItemInput" }
        poll: { $ref: "#/components/schemas/PollInput" }
    PostUpdate:
      type: object
      properties:
        content: { type: string }
        privacy: { type: string, enum: [public, friends, private] }
        commentsEnabled: { type: boolean }
        reactionsEnabled: { type: boolean }

    Comment:
      type: object
      required: [id, postId, author, content, createdAt, reactionCount, replyCount]
      properties:
        id: { type: integer }
        postId: { type: integer }
        author: { $ref: "#/components/schemas/Profile" }
        authorPage:
          oneOf:
            - { $ref: "#/components/schemas/PageRef" }
            - { type: "null" }
        parentId: { type: ["integer", "null"] }
        content: { type: string }
        mediaUrl: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        reactionCount: { type: integer }
        replyCount: { type: integer }
        viewerReaction:
          oneOf:
            - { $ref: "#/components/schemas/ReactionType" }
            - { type: "null" }
    CommentInput:
      type: object
      required: [content]
      properties:
        content: { type: string }
        parentId: { type: integer }
        mediaUrl: { type: string }
        pageId:
          type: integer
          description: When set, comment as this Page (must be owner/editor of the page).
    CommentUpdate:
      type: object
      required: [content]
      properties:
        content: { type: string }

    ShareInput:
      type: object
      properties:
        caption: { type: string }

    FriendRequest:
      type: object
      required: [id, requester, addressee, status, createdAt]
      properties:
        id: { type: integer }
        requester: { $ref: "#/components/schemas/Profile" }
        addressee: { $ref: "#/components/schemas/Profile" }
        status: { type: string, enum: [pending, accepted, declined] }
        createdAt: { type: string, format: date-time }
    FriendRequestInput:
      type: object
      required: [addresseeId]
      properties:
        addresseeId: { type: string }

    Conversation:
      type: object
      required: [id, type, members, unreadCount, createdAt, lastMessageAt]
      properties:
        id: { type: integer }
        type: { type: string, enum: [direct, group] }
        title: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        members:
          type: array
          items: { $ref: "#/components/schemas/ConversationMember" }
        lastMessage:
          oneOf:
            - { $ref: "#/components/schemas/Message" }
            - { type: "null" }
        unreadCount: { type: integer }
        createdAt: { type: string, format: date-time }
        lastMessageAt: { type: string, format: date-time }
    ConversationMember:
      type: object
      required: [user, role, joinedAt]
      properties:
        user: { $ref: "#/components/schemas/Profile" }
        role: { type: string, enum: [member, admin] }
        lastReadMessageId: { type: ["integer", "null"] }
        joinedAt: { type: string, format: date-time }
    ConversationInput:
      type: object
      required: [memberIds]
      properties:
        type: { type: string, enum: [direct, group] }
        memberIds:
          type: array
          items: { type: string }
        title: { type: string }
    ConversationUpdate:
      type: object
      properties:
        title: { type: string }
        avatarUrl: { type: string }

    Attachment:
      type: object
      required: [id, url, type]
      properties:
        id: { type: integer }
        url: { type: string }
        type: { type: string, enum: [image, video, file, audio] }
        name: { type: ["string", "null"] }
        thumbnailUrl: { type: ["string", "null"] }
        sizeBytes: { type: ["integer", "null"] }
        width: { type: ["integer", "null"] }
        height: { type: ["integer", "null"] }
        durationMs: { type: ["integer", "null"] }
    AttachmentInput:
      type: object
      required: [url, type]
      properties:
        url: { type: string }
        type: { type: string, enum: [image, video, file, audio] }
        name: { type: string }
        thumbnailUrl: { type: string }
        sizeBytes: { type: integer }
        width: { type: integer }
        height: { type: integer }
        durationMs: { type: integer }
    MessageReaction:
      type: object
      required: [emoji, count]
      properties:
        emoji: { type: string }
        count: { type: integer }
        viewerReacted: { type: boolean }
    Message:
      type: object
      required: [id, conversationId, sender, content, type, attachments, reactions, createdAt]
      properties:
        id: { type: integer }
        conversationId: { type: integer }
        sender: { $ref: "#/components/schemas/Profile" }
        content: { type: string }
        type: { type: string, enum: [text, image, video, file, audio, sticker, call] }
        replyToId: { type: ["integer", "null"] }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/Attachment" }
        reactions:
          type: array
          items: { $ref: "#/components/schemas/MessageReaction" }
        createdAt: { type: string, format: date-time }
        editedAt: { type: ["string", "null"], format: date-time }
        deletedAt: { type: ["string", "null"], format: date-time }
    MessageInput:
      type: object
      properties:
        content: { type: string }
        type: { type: string, enum: [text, image, video, file, audio, sticker, call] }
        replyToId: { type: integer }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/AttachmentInput" }
    MessageReactionInput:
      type: object
      required: [emoji]
      properties:
        emoji: { type: string }
    MessageEdit:
      type: object
      required: [content]
      properties:
        content: { type: string, minLength: 1, maxLength: 5000 }
    ReadInput:
      type: object
      required: [messageId]
      properties:
        messageId: { type: integer }
    MembersInput:
      type: object
      required: [userIds]
      properties:
        userIds:
          type: array
          items: { type: string }

    Group:
      type: object
      required:
        [
          id,
          name,
          privacy,
          memberCount,
          viewerIsMember,
          viewerStatus,
          viewerIsMuted,
          requirePostApproval,
          createdAt,
        ]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        coverUrl: { type: ["string", "null"] }
        privacy: { type: string, enum: [public, friends, private, hidden] }
        rules: { type: ["string", "null"] }
        requirePostApproval: { type: boolean }
        joinQuestions:
          type: ["array", "null"]
          items: { type: string }
        pinnedPostId: { type: ["integer", "null"] }
        memberCount: { type: integer }
        viewerIsMember: { type: boolean }
        viewerStatus:
          type: string
          enum: [none, active, pending, banned]
        viewerRole:
          type: ["string", "null"]
          enum: [admin, moderator, member, null]
        viewerIsMuted: { type: boolean }
        createdAt: { type: string, format: date-time }
    GroupInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        privacy: { type: string, enum: [public, private, hidden] }
        rules: { type: string }
        requirePostApproval: { type: boolean }
        joinQuestions:
          type: array
          items: { type: string }
        avatarUrl: { type: string }
        coverUrl: { type: string }
    GroupUpdateInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        description: { type: ["string", "null"] }
        privacy: { type: string, enum: [public, private, hidden] }
        rules: { type: ["string", "null"] }
        requirePostApproval: { type: boolean }
        joinQuestions:
          type: ["array", "null"]
          items: { type: string }
        avatarUrl: { type: ["string", "null"] }
        coverUrl: { type: ["string", "null"] }
        pinnedPostId: { type: ["integer", "null"] }
    JoinGroupInput:
      type: object
      properties:
        answers:
          type: array
          items: { type: string }
    GroupMember:
      type: object
      required: [user, role, status, isMuted, joinedAt]
      properties:
        user: { $ref: "#/components/schemas/Profile" }
        role: { type: string, enum: [admin, moderator, member] }
        status: { type: string, enum: [active, pending, banned] }
        isMuted: { type: boolean }
        answers:
          type: ["array", "null"]
          items: { type: string }
        joinedAt: { type: string, format: date-time }
    SetMemberRoleInput:
      type: object
      required: [role]
      properties:
        role: { type: string, enum: [moderator, member] }
    MuteMemberInput:
      type: object
      required: [muted]
      properties:
        muted: { type: boolean }

    Page:
      type: object
      required:
        [
          id,
          name,
          ownerId,
          ctaType,
          followerCount,
          reviewCount,
          averageRating,
          createdAt,
        ]
      properties:
        id: { type: integer }
        name: { type: string }
        category: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        coverUrl: { type: ["string", "null"] }
        contactPhone: { type: ["string", "null"] }
        contactEmail: { type: ["string", "null"] }
        website: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        hours: { type: ["string", "null"] }
        ctaType:
          type: string
          enum: [none, message, call, shop, signup]
        ctaUrl: { type: ["string", "null"] }
        ownerId: { type: string }
        followerCount: { type: integer }
        reviewCount: { type: integer }
        averageRating: { type: ["number", "null"] }
        viewerFollows: { type: boolean }
        viewerCanPost: { type: boolean }
        viewerReview:
          oneOf:
            - $ref: "#/components/schemas/PageReview"
            - type: "null"
        createdAt: { type: string, format: date-time }
    PageInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        category: { type: string }
        description: { type: string }
        avatarUrl: { type: string }
        coverUrl: { type: string }
        contactPhone: { type: string }
        contactEmail: { type: string }
        website: { type: string }
        address: { type: string }
        hours: { type: string }
        ctaType: { type: string, enum: [none, message, call, shop, signup] }
        ctaUrl: { type: string }
    PageUpdateInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        category: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        coverUrl: { type: ["string", "null"] }
        contactPhone: { type: ["string", "null"] }
        contactEmail: { type: ["string", "null"] }
        website: { type: ["string", "null"] }
        address: { type: ["string", "null"] }
        hours: { type: ["string", "null"] }
        ctaType: { type: string, enum: [none, message, call, shop, signup] }
        ctaUrl: { type: ["string", "null"] }
    PageMember:
      type: object
      required: [id, user, role, createdAt]
      properties:
        id: { type: integer }
        user: { $ref: "#/components/schemas/Profile" }
        role: { type: string, enum: [editor] }
        createdAt: { type: string, format: date-time }
    PageMemberInput:
      type: object
      required: [userId]
      properties:
        userId: { type: string }
        role: { type: string, enum: [editor], default: editor }
    PageReview:
      type: object
      required: [id, user, rating, createdAt]
      properties:
        id: { type: integer }
        user: { $ref: "#/components/schemas/Profile" }
        rating: { type: integer, minimum: 1, maximum: 5 }
        body: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
    PageReviewInput:
      type: object
      required: [rating]
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        body: { type: string }

    UserSettings:
      type: object
      required:
        [
          profileVisibility,
          postVisibility,
          friendRequestPrivacy,
          showOnlineStatus,
          isLocked,
          notifyLikes,
          notifyComments,
          notifyFriendRequests,
          notifyMessages,
          emailNotifications,
          pushNotifications,
          language,
        ]
      properties:
        profileVisibility:
          { type: string, enum: [public, friends, only_me] }
        postVisibility: { type: string, enum: [public, friends, only_me] }
        friendRequestPrivacy:
          { type: string, enum: [everyone, friends_of_friends] }
        showOnlineStatus: { type: boolean }
        isLocked: { type: boolean }
        notifyLikes: { type: boolean }
        notifyComments: { type: boolean }
        notifyFriendRequests: { type: boolean }
        notifyMessages: { type: boolean }
        emailNotifications: { type: boolean }
        pushNotifications: { type: boolean }
        language: { type: string, enum: [banglish, bn, en] }
    UserSettingsUpdate:
      type: object
      properties:
        profileVisibility:
          { type: string, enum: [public, friends, only_me] }
        postVisibility: { type: string, enum: [public, friends, only_me] }
        friendRequestPrivacy:
          { type: string, enum: [everyone, friends_of_friends] }
        showOnlineStatus: { type: boolean }
        isLocked: { type: boolean }
        notifyLikes: { type: boolean }
        notifyComments: { type: boolean }
        notifyFriendRequests: { type: boolean }
        notifyMessages: { type: boolean }
        emailNotifications: { type: boolean }
        pushNotifications: { type: boolean }
        language: { type: string, enum: [banglish, bn, en] }
    MarketplaceListing:
      type: object
      required:
        [
          id,
          seller,
          title,
          price,
          currency,
          category,
          condition,
          photos,
          status,
          createdAt,
        ]
      properties:
        id: { type: integer }
        seller: { $ref: "#/components/schemas/Profile" }
        title: { type: string }
        price: { type: integer }
        currency: { type: string }
        category: { type: string }
        condition: { type: string }
        description: { type: ["string", "null"] }
        location: { type: ["string", "null"] }
        lat: { type: ["number", "null"] }
        lng: { type: ["number", "null"] }
        distanceKm: { type: ["number", "null"] }
        photos:
          type: array
          items: { type: string }
        status: { type: string, enum: [available, sold] }
        viewerIsSeller: { type: boolean }
        viewerHasSaved: { type: boolean }
        createdAt: { type: string, format: date-time }
    GeocodeResult:
      type: object
      required: [displayName, lat, lng]
      properties:
        displayName: { type: string }
        lat: { type: number }
        lng: { type: number }
    MarketplaceListingInput:
      type: object
      required: [title, price]
      properties:
        title: { type: string, minLength: 1 }
        price: { type: integer, minimum: 0 }
        currency: { type: string }
        category: { type: string }
        condition: { type: string }
        description: { type: string }
        location: { type: string }
        lat: { type: number }
        lng: { type: number }
        photos:
          type: array
          items: { type: string }
    MarketplaceListingUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        price: { type: integer, minimum: 0 }
        category: { type: string }
        condition: { type: string }
        description: { type: string }
        location: { type: string }
        lat: { type: number }
        lng: { type: number }
        photos:
          type: array
          items: { type: string }
        status: { type: string, enum: [available, sold] }
    SellingOverview:
      type: object
      required: [activeListings, soldListings, totalListings, listings]
      properties:
        activeListings: { type: integer }
        soldListings: { type: integer }
        totalListings: { type: integer }
        listings:
          type: array
          items: { $ref: "#/components/schemas/MarketplaceListing" }

