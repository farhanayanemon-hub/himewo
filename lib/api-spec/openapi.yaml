components:
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]
    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]

    ReactionType:
      type: string
      enum: [like, love, care, haha, wow, sad, angry]

    Profile:
      type: object
      required: [id, username, displayName, isVerified, createdAt]
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        coverUrl: { type: ["string", "null"] }
        bio: { type: ["string", "null"] }
        birthday: { type: ["string", "null"] }
        location: { type: ["string", "null"] }
        work: { type: ["string", "null"] }
        education: { type: ["string", "null"] }
        hometown: { type: ["string", "null"] }
        hobbies: { type: ["string", "null"] }
        interests: { type: ["string", "null"] }
        website: { type: ["string", "null"] }
        isVerified: { type: boolean }
        createdAt: { type: string, format: date-time }
        friendCount: { type: ["integer", "null"] }
        followerCount: { type: ["integer", "null"] }
        followingCount: { type: ["integer", "null"] }
        postCount: { type: ["integer", "null"] }
        viewerIsFriend: { type: ["boolean", "null"] }
        viewerHasPendingRequest: { type: ["boolean", "null"] }
        viewerFollows: { type: ["boolean", "null"] }
        presence:
          type: ["object", "null"]
          properties:
            status: { type: string }
            lastSeenAt: { type: ["string", "null"], format: date-time }
    ProfileInput:
      type: object
      required: [id, username, displayName]
      properties:
        id: { type: string }
        username: { type: string, minLength: 1 }
        displayName: { type: string, minLength: 1 }
        email: { type: string }
        phone: { type: string }
        avatarUrl: { type: string }
    ProfileUpdate:
      type: object
      properties:
        displayName: { type: string, minLength: 1 }
        bio: { type: string }
        birthday: { type: string }
        avatarUrl: { type: string }
        coverUrl: { type: string }
        location: { type: string }
        work: { type: string }
        education: { type: string }
        hometown: { type: string }
        hobbies: { type: string }
        interests: { type: string }
        website: { type: string }
        email: { type: string }
        phone: { type: string }

    MediaItem:
      type: object
      required: [id, url, type]
      properties:
        id: { type: integer }
        url: { type: string }
        type: { type: string, enum: [image, video] }
        thumbnailUrl: { type: ["string", "null"] }
        width: { type: ["integer", "null"] }
        height: { type: ["integer", "null"] }
        durationMs: { type: ["integer", "null"] }
        position: { type: integer }
    MediaItemInput:
      type: object
      required: [url, type]
      properties:
        url: { type: string }
        type: { type: string, enum: [image, video] }
        thumbnailUrl: { type: string }
        width: { type: integer }
        height: { type: integer }
        durationMs: { type: integer }
        position: { type: integer }

    ReactionSummary:
      type: object
      required: [total, byType]
      properties:
        total: { type: integer }
        byType:
          type: object
          additionalProperties: { type: integer }
        viewerReaction:
          oneOf:
            - { $ref: "#/components/schemas/ReactionType" }
            - { type: "null" }
    ReactionInput:
      type: object
      required: [type]
      properties:
        type: { $ref: "#/components/schemas/ReactionType" }
    ReactionUser:
      type: object
      required: [user, type]
      properties:
        user: { $ref: "#/components/schemas/Profile" }
        type: { $ref: "#/components/schemas/ReactionType" }

    Post:
      type: object
      required: [id, author, content, privacy, media, reactions, commentCount, shareCount, createdAt]
      properties:
        id: { type: integer }
        author: { $ref: "#/components/schemas/Profile" }
        content: { type: string }
        privacy: { type: string, enum: [public, friends, private] }
        groupId: { type: ["integer", "null"] }
        pageId: { type: ["integer", "null"] }
        media:
          type: array
          items: { $ref: "#/components/schemas/MediaItem" }
        reactions: { $ref: "#/components/schemas/ReactionSummary" }
        commentCount: { type: integer }
        shareCount: { type: integer }
        viewerHasSaved: { type: boolean }
        sharedPost:
          oneOf:
            - { $ref: "#/components/schemas/SharedPost" }
            - { type: "null" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    SharedPost:
      type: object
      required: [id, author, content, privacy, media, reactions, commentCount, shareCount, createdAt]
      properties:
        id: { type: integer }
        author: { $ref: "#/components/schemas/Profile" }
        content: { type: string }
        privacy: { type: string, enum: [public, friends, private] }
        groupId: { type: ["integer", "null"] }
        pageId: { type: ["integer", "null"] }
        media:
          type: array
          items: { $ref: "#/components/schemas/MediaItem" }
        reactions: { $ref: "#/components/schemas/ReactionSummary" }
        commentCount: { type: integer }
        shareCount: { type: integer }
        viewerHasSaved: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    PostInput:
      type: object
      required: [content]
      properties:
        content: { type: string }
        privacy: { type: string, enum: [public, friends, private] }
        groupId: { type: integer }
        pageId: { type: integer }
        media:
          type: array
          items: { $ref: "#/components/schemas/MediaItemInput" }
    PostUpdate:
      type: object
      properties:
        content: { type: string }
        privacy: { type: string, enum: [public, friends, private] }

    Comment:
      type: object
      required: [id, postId, author, content, createdAt, reactionCount, replyCount]
      properties:
        id: { type: integer }
        postId: { type: integer }
        author: { $ref: "#/components/schemas/Profile" }
        parentId: { type: ["integer", "null"] }
        content: { type: string }
        mediaUrl: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        reactionCount: { type: integer }
        replyCount: { type: integer }
        viewerReaction:
          oneOf:
            - { $ref: "#/components/schemas/ReactionType" }
            - { type: "null" }
    CommentInput:
      type: object
      required: [content]
      properties:
        content: { type: string }
        parentId: { type: integer }
        mediaUrl: { type: string }
    CommentUpdate:
      type: object
      required: [content]
      properties:
        content: { type: string }

    ShareInput:
      type: object
      properties:
        caption: { type: string }

    FriendRequest:
      type: object
      required: [id, requester, addressee, status, createdAt]
      properties:
        id: { type: integer }
        requester: { $ref: "#/components/schemas/Profile" }
        addressee: { $ref: "#/components/schemas/Profile" }
        status: { type: string, enum: [pending, accepted, declined] }
        createdAt: { type: string, format: date-time }
    FriendRequestInput:
      type: object
      required: [addresseeId]
      properties:
        addresseeId: { type: string }

    Conversation:
      type: object
      required: [id, type, members, unreadCount, createdAt, lastMessageAt]
      properties:
        id: { type: integer }
        type: { type: string, enum: [direct, group] }
        title: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        members:
          type: array
          items: { $ref: "#/components/schemas/ConversationMember" }
        lastMessage:
          oneOf:
            - { $ref: "#/components/schemas/Message" }
            - { type: "null" }
        unreadCount: { type: integer }
        createdAt: { type: string, format: date-time }
        lastMessageAt: { type: string, format: date-time }
    ConversationMember:
      type: object
      required: [user, role, joinedAt]
      properties:
        user: { $ref: "#/components/schemas/Profile" }
        role: { type: string, enum: [member, admin] }
        lastReadMessageId: { type: ["integer", "null"] }
        joinedAt: { type: string, format: date-time }
    ConversationInput:
      type: object
      required: [memberIds]
      properties:
        type: { type: string, enum: [direct, group] }
        memberIds:
          type: array
          items: { type: string }
        title: { type: string }
    ConversationUpdate:
      type: object
      properties:
        title: { type: string }
        avatarUrl: { type: string }

    Attachment:
      type: object
      required: [id, url, type]
      properties:
        id: { type: integer }
        url: { type: string }
        type: { type: string, enum: [image, video, file, audio] }
        name: { type: ["string", "null"] }
        thumbnailUrl: { type: ["string", "null"] }
        sizeBytes: { type: ["integer", "null"] }
        width: { type: ["integer", "null"] }
        height: { type: ["integer", "null"] }
        durationMs: { type: ["integer", "null"] }
    AttachmentInput:
      type: object
      required: [url, type]
      properties:
        url: { type: string }
        type: { type: string, enum: [image, video, file, audio] }
        name: { type: string }
        thumbnailUrl: { type: string }
        sizeBytes: { type: integer }
        width: { type: integer }
        height: { type: integer }
        durationMs: { type: integer }
    MessageReaction:
      type: object
      required: [emoji, count]
      properties:
        emoji: { type: string }
        count: { type: integer }
        viewerReacted: { type: boolean }
    Message:
      type: object
      required: [id, conversationId, sender, content, type, attachments, reactions, createdAt]
      properties:
        id: { type: integer }
        conversationId: { type: integer }
        sender: { $ref: "#/components/schemas/Profile" }
        content: { type: string }
        type: { type: string, enum: [text, image, video, file, audio, sticker, call] }
        replyToId: { type: ["integer", "null"] }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/Attachment" }
        reactions:
          type: array
          items: { $ref: "#/components/schemas/MessageReaction" }
        createdAt: { type: string, format: date-time }
        editedAt: { type: ["string", "null"], format: date-time }
        deletedAt: { type: ["string", "null"], format: date-time }
    MessageInput:
      type: object
      properties:
        content: { type: string }
        type: { type: string, enum: [text, image, video, file, audio, sticker, call] }
        replyToId: { type: integer }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/AttachmentInput" }
    MessageReactionInput:
      type: object
      required: [emoji]
      properties:
        emoji: { type: string }
    ReadInput:
      type: object
      required: [messageId]
      properties:
        messageId: { type: integer }
    MembersInput:
      type: object
      required: [userIds]
      properties:
        userIds:
          type: array
          items: { type: string }

    Group:
      type: object
      required: [id, name, privacy, memberCount, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        coverUrl: { type: ["string", "null"] }
        privacy: { type: string, enum: [public, friends, private] }
        memberCount: { type: integer }
        viewerIsMember: { type: boolean }
        createdAt: { type: string, format: date-time }
    GroupInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        description: { type: string }
        privacy: { type: string, enum: [public, friends, private] }
        avatarUrl: { type: string }
        coverUrl: { type: string }

    Page:
      type: object
      required: [id, name, followerCount, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        category: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        coverUrl: { type: ["string", "null"] }
        followerCount: { type: integer }
        viewerFollows: { type: boolean }
        createdAt: { type: string, format: date-time }
    PageInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        category: { type: string }
        description: { type: string }
        avatarUrl: { type: string }
        coverUrl: { type: string }

    UserSettings:
      type: object
      required:
        [
          profileVisibility,
          postVisibility,
          friendRequestPrivacy,
          showOnlineStatus,
          notifyLikes,
          notifyComments,
          notifyFriendRequests,
          notifyMessages,
          emailNotifications,
          pushNotifications,
          language,
        ]
      properties:
        profileVisibility:
          { type: string, enum: [public, friends, only_me] }
        postVisibility: { type: string, enum: [public, friends, only_me] }
        friendRequestPrivacy:
          { type: string, enum: [everyone, friends_of_friends] }
        showOnlineStatus: { type: boolean }
        notifyLikes: { type: boolean }
        notifyComments: { type: boolean }
        notifyFriendRequests: { type: boolean }
        notifyMessages: { type: boolean }
        emailNotifications: { type: boolean }
        pushNotifications: { type: boolean }
        language: { type: string, enum: [banglish, bn, en] }
    UserSettingsUpdate:
      type: object
      properties:
        profileVisibility:
          { type: string, enum: [public, friends, only_me] }
        postVisibility: { type: string, enum: [public, friends, only_me] }
        friendRequestPrivacy:
          { type: string, enum: [everyone, friends_of_friends] }
        showOnlineStatus: { type: boolean }
        notifyLikes: { type: boolean }
        notifyComments: { type: boolean }
        notifyFriendRequests: { type: boolean }
        notifyMessages: { type: boolean }
        emailNotifications: { type: boolean }
        pushNotifications: { type: boolean }
        language: { type: string, enum: [banglish, bn, en] }
    MarketplaceListing:
      type: object
      required:
        [
          id,
          seller,
          title,
          price,
          currency,
          category,
          condition,
          photos,
          status,
          createdAt,
        ]
      properties:
        id: { type: integer }
        seller: { $ref: "#/components/schemas/Profile" }
        title: { type: string }
        price: { type: integer }
        currency: { type: string }
        category: { type: string }
        condition: { type: string }
        description: { type: ["string", "null"] }
        location: { type: ["string", "null"] }
        photos:
          type: array
          items: { type: string }
        status: { type: string, enum: [available, sold] }
        viewerIsSeller: { type: boolean }
        viewerHasSaved: { type: boolean }
        createdAt: { type: string, format: date-time }
    MarketplaceListingInput:
      type: object
      required: [title, price]
      properties:
        title: { type: string, minLength: 1 }
        price: { type: integer, minimum: 0 }
        currency: { type: string }
        category: { type: string }
        condition: { type: string }
        description: { type: string }
        location: { type: string }
        photos:
          type: array
          items: { type: string }
    MarketplaceListingUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        price: { type: integer, minimum: 0 }
        category: { type: string }
        condition: { type: string }
        description: { type: string }
        location: { type: string }
        photos:
          type: array
          items: { type: string }
        status: { type: string, enum: [available, sold] }
    SellingOverview:
      type: object
      required: [activeListings, soldListings, totalListings, listings]
      properties:
        activeListings: { type: integer }
        soldListings: { type: integer }
        totalListings: { type: integer }
        listings:
          type: array
          items: { $ref: "#/components/schemas/MarketplaceListing" }

    SavedItem:
      type: object
      required: [id, entityType, entityId, createdAt]
      properties:
        id: { type: integer }
        entityType: { type: string, enum: [post, listing, reel] }
        entityId: { type: integer }
        post:
          oneOf:
            - { $ref: "#/components/schemas/Post" }
            - { type: "null" }
        listing:
          oneOf:
            - { $ref: "#/components/schemas/MarketplaceListing" }
            - { type: "null" }
        reel:
          oneOf:
            - { $ref: "#/components/schemas/Reel" }
            - { type: "null" }
        createdAt: { type: string, format: date-time }
    SavedItemInput:
      type: object
      required: [entityType, entityId]
      properties:
        entityType: { type: string, enum: [post, listing, reel] }
        entityId: { type: integer }

    Story:
      type: object
      required: [id, author, mediaUrl, mediaType, createdAt, expiresAt, viewCount, viewerHasViewed]
      properties:
        id: { type: integer }
        author: { $ref: "#/components/schemas/Profile" }
        mediaUrl: { type: string }
        mediaType: { type: string, enum: [image, video] }
        caption: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        viewCount: { type: integer }
        viewerHasViewed: { type: boolean }
    StoryInput:
      type: object
      required: [mediaUrl, mediaType]
      properties:
        mediaUrl: { type: string }
        mediaType: { type: string, enum: [image, video] }
        caption: { type: string }
        expiresInHours: { type: integer }
    StoryGroup:
      type: object
      required: [author, stories, hasUnseen]
      properties:
        author: { $ref: "#/components/schemas/Profile" }
        stories:
          type: array
          items: { $ref: "#/components/schemas/Story" }
        hasUnseen: { type: boolean }

    Reel:
      type: object
      required: [id, author, videoUrl, createdAt, likeCount, commentCount, viewerHasLiked, viewerHasSaved]
      properties:
        id: { type: integer }
        author: { $ref: "#/components/schemas/Profile" }
        videoUrl: { type: string }
        thumbnailUrl: { type: ["string", "null"] }
        caption: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        likeCount: { type: integer }
        commentCount: { type: integer }
        viewerHasLiked: { type: boolean }
        viewerHasSaved: { type: boolean }
    ReelInput:
      type: object
      required: [videoUrl]
      properties:
        videoUrl: { type: string }
        thumbnailUrl: { type: string }
        caption: { type: string }
    ReelComment:
      type: object
      required: [id, reelId, author, content, createdAt]
      properties:
        id: { type: integer }
        reelId: { type: integer }
        author: { $ref: "#/components/schemas/Profile" }
        content: { type: string }
        createdAt: { type: string, format: date-time }
    ReelCommentInput:
      type: object
      required: [content]
      properties:
        content: { type: string }

    Notification:
      type: object
      required: [id, type, isRead, createdAt]
      properties:
        id: { type: integer }
        type:
          type: string
          enum: [reaction, comment, friend_request, friend_accept, follow, message, group_invite, page_follow, mention, share, story_view]
        actor:
          oneOf:
            - { $ref: "#/components/schemas/Profile" }
            - { type: "null" }
        entityType: { type: ["string", "null"] }
        entityId: { type: ["integer", "null"] }
        isRead: { type: boolean }
        createdAt: { type: string, format: date-time }
    UnreadCount:
      type: object
      required: [count]
      properties:
        count: { type: integer }

    UploadUrlInput:
      type: object
      required: [fileName, contentType]
      properties:
        fileName: { type: string }
        contentType: { type: string }
        bucket: { type: string }
    UploadUrlResponse:
      type: object
      required: [uploadUrl, publicUrl, path]
      properties:
        uploadUrl: { type: string }
        publicUrl: { type: string }
        path: { type: string }
        token: { type: ["string", "null"] }
