openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: HiMewo social platform + Messenger API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: posts
  - name: comments
  - name: friends
  - name: messaging
  - name: groups
  - name: pages
  - name: stories
  - name: reels
  - name: notifications
  - name: media
  - name: settings
  - name: earnings
  - name: earnings-admin

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ---------------- Auth ----------------
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user's profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/sync:
    post:
      operationId: syncProfile
      tags: [auth]
      summary: Create or update the app profile for the authenticated Supabase user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileInput"
      responses:
        "200":
          description: Synced profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  # ---------------- Users ----------------
  /users:
    get:
      operationId: searchUsers
      tags: [users]
      summary: Search users
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Profile" }
  /users/suggestions:
    get:
      operationId: getFriendSuggestions
      tags: [users]
      summary: Get people-you-may-know suggestions
      responses:
        "200":
          description: Suggestions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FriendSuggestion" }
  /users/me:
    patch:
      operationId: updateMyProfile
      tags: [users]
      summary: Update own profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
  /birthdays:
    get:
      operationId: getTodaysBirthdays
      tags: [users]
      summary: Friends whose birthday is today
      responses:
        "200":
          description: Friends with a birthday today
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Profile" }
  /users/by-username/{username}:
    get:
      operationId: getUserByUsername
      tags: [users]
      parameters:
        - { name: username, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          $ref: "#/components/responses/NotFound"
  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          $ref: "#/components/responses/NotFound"
  /users/{id}/posts:
    get:
      operationId: getUserPosts
      tags: [users]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: cursor, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer, default: 20 } }
      responses:
        "200":
          description: Posts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Post" }
  /users/{id}/friends:
    get:
      operationId: getUserFriends
      tags: [users]
      summary: List a user's friends
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
      responses:
        "200":
          description: Friends
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Profile" }

  # ---------------- Feed & Posts ----------------
  /feed:
    get:
      operationId: getFeed
      tags: [posts]
      summary: Home feed
      parameters:
        - { name: cursor, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer, default: 20 } }
      responses:
        "200":
          description: Feed
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Post" }
  /watch:
    get:
      operationId: getWatchFeed
      tags: [posts]
      summary: Watch feed (video posts only)
      parameters:
        - { name: cursor, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer, default: 20 } }
      responses:
        "200":
          description: Video posts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Post" }
        "401":
          $ref: "#/components/responses/Unauthorized"
  /hashtags/{tag}/posts:
    get:
      operationId: getHashtagPosts
      tags: [posts]
      summary: Posts containing a hashtag (visibility-filtered)
      parameters:
        - { name: tag, in: path, required: true, schema: { type: string } }
        - { name: cursor, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer, default: 20 } }
      responses:
        "200":
          description: Posts with this hashtag
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Post" }
        "401":
          $ref: "#/components/responses/Unauthorized"
  /posts:
    post:
      operationId: createPost
      tags: [posts]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updatePost
      tags: [posts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
    delete:
      operationId: deletePost
      tags: [posts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /posts/{id}/reaction:
    put:
      operationId: setPostReaction
      tags: [posts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReactionInput" }
      responses:
        "200":
          description: Reaction summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReactionSummary" }
    delete:
      operationId: removePostReaction
      tags: [posts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Reaction summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReactionSummary" }
  /posts/{id}/poll/vote:
    put:
      operationId: votePoll
      tags: [posts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PollVoteInput" }
      responses:
        "200":
          description: Poll
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Poll" }
    delete:
      operationId: removePollVote
      tags: [posts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Poll
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Poll" }
  /posts/{id}/reactions:
    get:
      operationId: listPostReactions
      tags: [posts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Reactions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ReactionUser" }
  /posts/{id}/share:
    post:
      operationId: sharePost
      tags: [posts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ShareInput" }
      responses:
        "201":
          description: Shared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
  /posts/{id}/comments:
    get:
      operationId: listComments
      tags: [comments]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: cursor, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer, default: 30 } }
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Comment" }
    post:
      operationId: createComment
      tags: [comments]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CommentInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }

  # ---------------- Comments ----------------
  /comments/{id}:
    patch:
      operationId: updateComment
      tags: [comments]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CommentUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }
    delete:
      operationId: deleteComment
      tags: [comments]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /comments/{id}/reaction:
    put:
      operationId: setCommentReaction
      tags: [comments]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReactionInput" }
      responses:
        "200":
          description: Updated comment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }
    delete:
      operationId: removeCommentReaction
      tags: [comments]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Updated comment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }

  # ---------------- Friends & Follow ----------------
  /friends:
    get:
      operationId: listFriends
      tags: [friends]
      responses:
        "200":
          description: Friends
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Profile" }
  /friends/requests:
    get:
      operationId: listFriendRequests
      tags: [friends]
      responses:
        "200":
          description: Incoming requests
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FriendRequest" }
    post:
      operationId: sendFriendRequest
      tags: [friends]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FriendRequestInput" }
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FriendRequest" }
  /friends/requests/{id}/accept:
    post:
      operationId: acceptFriendRequest
      tags: [friends]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FriendRequest" }
  /friends/requests/{id}/decline:
    post:
      operationId: declineFriendRequest
      tags: [friends]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Declined
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FriendRequest" }
  /friends/{userId}:
    delete:
      operationId: removeFriend
      tags: [friends]
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Removed }
  /follow/{userId}:
    post:
      operationId: followUser
      tags: [friends]
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Followed }
    delete:
      operationId: unfollowUser
      tags: [friends]
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Unfollowed }

  # ---------------- Messaging ----------------
  /conversations:
    get:
      operationId: listConversations
      tags: [messaging]
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Conversation" }
    post:
      operationId: createConversation
      tags: [messaging]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConversationInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Conversation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateConversation
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConversationUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
  /conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: cursor, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer, default: 30 } }
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Message" }
    post:
      operationId: sendMessage
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MessageInput" }
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }
  /conversations/{id}/read:
    post:
      operationId: markConversationRead
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReadInput" }
      responses:
        "204": { description: Marked read }
  /conversations/{id}/members:
    post:
      operationId: addConversationMembers
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MembersInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
  /conversations/{id}/members/{userId}:
    delete:
      operationId: removeConversationMember
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Removed }
  /messages/{id}/reaction:
    put:
      operationId: setMessageReaction
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MessageReactionInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }
    delete:
      operationId: removeMessageReaction
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }
  /messages/{id}:
    patch:
      operationId: editMessage
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MessageEdit" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }
        "403":
          description: Not allowed (not sender or edit window expired)
    delete:
      operationId: deleteMessage
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /messages/{id}/hide:
    post:
      operationId: hideMessage
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Hidden for the current user }

  # ---------------- Groups ----------------
  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      responses:
        "200":
          description: Groups
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Group" }
    post:
      operationId: createGroup
      tags: [groups]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GroupInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Group" }
  /groups/{id}:
    get:
      operationId: getGroup
      tags: [groups]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Group
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Group" }
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateGroup
      tags: [groups]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GroupUpdateInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Group" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /groups/{id}/join:
    post:
      operationId: joinGroup
      tags: [groups]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JoinGroupInput" }
      responses:
        "204": { description: Joined or requested }
        "403":
          $ref: "#/components/responses/Forbidden"
  /groups/{id}/leave:
    delete:
      operationId: leaveGroup
      tags: [groups]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Left }
  /groups/{id}/members:
    get:
      operationId: listGroupMembers
      tags: [groups]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GroupMember" }
  /groups/{id}/requests:
    get:
      operationId: listGroupRequests
      tags: [groups]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Pending join requests
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GroupMember" }
        "403":
          $ref: "#/components/responses/Forbidden"
  /groups/{id}/requests/{userId}/approve:
    post:
      operationId: approveGroupRequest
      tags: [groups]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Approved }
        "403":
          $ref: "#/components/responses/Forbidden"
  /groups/{id}/requests/{userId}/decline:
    post:
      operationId: declineGroupRequest
      tags: [groups]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Declined }
        "403":
          $ref: "#/components/responses/Forbidden"
  /groups/{id}/members/{userId}/role:
    post:
      operationId: setGroupMemberRole
      tags: [groups]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: userId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
