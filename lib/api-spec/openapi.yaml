        parentId: { type: integer }
        mediaUrl: { type: string }
    CommentUpdate:
      type: object
      required: [content]
      properties:
        content: { type: string }

    ShareInput:
      type: object
      properties:
        caption: { type: string }

    FriendRequest:
      type: object
      required: [id, requester, addressee, status, createdAt]
      properties:
        id: { type: integer }
        requester: { $ref: "#/components/schemas/Profile" }
        addressee: { $ref: "#/components/schemas/Profile" }
