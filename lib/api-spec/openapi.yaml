          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ---------------- Earnings admin (admin-only) ----------------
  /admin/earnings/summary:
    get:
      operationId: getAdminEarningsSummary
      tags: [earnings-admin]
      summary: Program-wide payout health (paid out, pending payout, outstanding balances)
      responses:
        "200":
          description: Aggregate earnings stats across all users (USD)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminEarningsSummary" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/earnings/config:
    get:
      operationId: getPointConfig
      tags: [earnings-admin]
      summary: Get the global earning configuration
      responses:
        "200":
          description: Point configuration
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PointConfig" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    put:
      operationId: updatePointConfig
      tags: [earnings-admin]
      summary: Update the global earning configuration (incl. master on/off)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PointConfigUpdate" }
      responses:
        "200":
          description: Updated configuration
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PointConfig" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/earnings/withdrawals:
    get:
      operationId: listAdminWithdrawals
      tags: [earnings-admin]
      summary: List withdrawal requests across all users
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [pending, approved, paid, rejected] } }
        - { name: cursor, in: query, schema: { type: integer, minimum: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 30, minimum: 1, maximum: 100 } }
      responses:
        "200":
          description: Withdrawal requests, most recent first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminWithdrawalRequest" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/earnings/withdrawals/{id}/process:
    post:
      operationId: processWithdrawal
      tags: [earnings-admin]
      summary: Process a withdrawal (approve / mark paid / reject; reject refunds the points)
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProcessWithdrawalInput" }
      responses:
        "200":
          description: Updated withdrawal request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminWithdrawalRequest" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /admin/earnings/users/{userId}/adjust:
    post:
      operationId: adjustUserPoints
      tags: [earnings-admin]
      summary: Manually add or remove points for a user
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdjustPointsInput" }
      responses:
        "200":
          description: New balance for the user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdjustPointsResult" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /admin/earnings/users/{userId}/reset:
    post:
      operationId: resetUserPoints
      tags: [earnings-admin]
      summary: Reset a user's points balance to zero
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: New balance for the user (zero)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdjustPointsResult" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]
    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]

    ReactionType:
      type: string
      enum: [like, love, care, haha, wow, sad, angry]

    Profile:
      type: object
      required: [id, username, displayName, isVerified, createdAt]
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        email: { type: ["string", "null"] }
        phone: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        coverUrl: { type: ["string", "null"] }
        bio: { type: ["string", "null"] }
        birthday: { type: ["string", "null"] }
        location: { type: ["string", "null"] }
        work: { type: ["string", "null"] }
        education: { type: ["string", "null"] }
        hometown: { type: ["string", "null"] }
        hobbies: { type: ["string", "null"] }
        interests: { type: ["string", "null"] }
        website: { type: ["string", "null"] }
        isVerified: { type: boolean }
        createdAt: { type: string, format: date-time }
        friendCount: { type: ["integer", "null"] }
        followerCount: { type: ["integer", "null"] }
        followingCount: { type: ["integer", "null"] }
        postCount: { type: ["integer", "null"] }
        viewerIsFriend: { type: ["boolean", "null"] }
        viewerHasPendingRequest: { type: ["boolean", "null"] }
        viewerFollows: { type: ["boolean", "null"] }
        viewerCanSendRequest: { type: ["boolean", "null"] }
        isLocked: { type: ["boolean", "null"] }
        presence:
          type: ["object", "null"]
          properties:
            status: { type: string }
            lastSeenAt: { type: ["string", "null"], format: date-time }
    ProfileInput:
      type: object
      required: [id, username, displayName]
      properties:
        id: { type: string }
        username: { type: string, minLength: 1 }
        displayName: { type: string, minLength: 1 }
        email: { type: string }
        phone: { type: string }
        avatarUrl: { type: string }
    ProfileUpdate:
      type: object
      properties:
        displayName: { type: string, minLength: 1 }
        bio: { type: string }
        birthday: { type: string }
        avatarUrl: { type: string }
        coverUrl: { type: string }
        location: { type: string }
        work: { type: string }
        education: { type: string }
        hometown: { type: string }
        hobbies: { type: string }
        interests: { type: string }
        website: { type: string }
        email: { type: string }
        phone: { type: string }

    MediaItem:
      type: object
      required: [id, url, type]
      properties:
        id: { type: integer }
        url: { type: string }
        type: { type: string, enum: [image, video] }
        thumbnailUrl: { type: ["string", "null"] }
        width: { type: ["integer", "null"] }
        height: { type: ["integer", "null"] }
        durationMs: { type: ["integer", "null"] }
        position: { type: integer }
    MediaItemInput:
      type: object
      required: [url, type]
      properties:
        url: { type: string }
        type: { type: string, enum: [image, video] }
        thumbnailUrl: { type: string }
        width: { type: integer }
        height: { type: integer }
        durationMs: { type: integer }
        position: { type: integer }

    ReactionSummary:
      type: object
      required: [total, byType]
      properties:
        total: { type: integer }
        byType:
          type: object
          additionalProperties: { type: integer }
        viewerReaction:
          oneOf:
            - { $ref: "#/components/schemas/ReactionType" }
            - { type: "null" }
    ReactionInput:
      type: object
      required: [type]
      properties:
        type: { $ref: "#/components/schemas/ReactionType" }
    ReactionUser:
      type: object
      required: [user, type]
      properties:
        user: { $ref: "#/components/schemas/Profile" }
        type: { $ref: "#/components/schemas/ReactionType" }

    Post:
      type: object
      required: [id, author, content, privacy, commentsEnabled, reactionsEnabled, media, reactions, commentCount, shareCount, createdAt]
      properties:
        id: { type: integer }
        author: { $ref: "#/components/schemas/Profile" }
        content: { type: string }
        feelingVerb: { type: ["string", "null"] }
        feeling: { type: ["string", "null"] }
        feelingEmoji: { type: ["string", "null"] }
        location: { type: ["string", "null"] }
        privacy: { type: string, enum: [public, friends, private] }
        commentsEnabled: { type: boolean }
        reactionsEnabled: { type: boolean }
        groupId: { type: ["integer", "null"] }
        pageId: { type: ["integer", "null"] }
        media:
          type: array
          items: { $ref: "#/components/schemas/MediaItem" }
        reactions: { $ref: "#/components/schemas/ReactionSummary" }
        commentCount: { type: integer }
        shareCount: { type: integer }
        viewerHasSaved: { type: boolean }
        poll:
          oneOf:
            - { $ref: "#/components/schemas/Poll" }
            - { type: "null" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Poll:
      type: object
      required: [id, question, totalVotes, options, viewerVotedOptionId]
      properties:
        id: { type: integer }
        question: { type: string }
        totalVotes: { type: integer }
        viewerVotedOptionId: { type: ["integer", "null"] }
        options:
          type: array
          items: { $ref: "#/components/schemas/PollOption" }
    PollOption:
      type: object
      required: [id, text, voteCount]
      properties:
        id: { type: integer }
        text: { type: string }
        voteCount: { type: integer }
    PollInput:
      type: object
      required: [question, options]
      properties:
        question: { type: string }
        options:
          type: array
          minItems: 2
          items: { type: string }
    PollVoteInput:
      type: object
      required: [optionId]
      properties:
        optionId: { type: integer }
    PostInput:
      type: object
      required: [content]
      properties:
        content: { type: string }
        feelingVerb: { type: string }
        feeling: { type: string }
        feelingEmoji: { type: string }
        location: { type: string }
        privacy: { type: string, enum: [public, friends, private] }
        groupId: { type: integer }
        pageId: { type: integer }
        media:
          type: array
          items: { $ref: "#/components/schemas/MediaItemInput" }
        poll: { $ref: "#/components/schemas/PollInput" }
    PostUpdate:
      type: object
      properties:
        content: { type: string }
        privacy: { type: string, enum: [public, friends, private] }
        commentsEnabled: { type: boolean }
        reactionsEnabled: { type: boolean }

    Comment:
      type: object
      required: [id, postId, author, content, createdAt, reactionCount, replyCount]
      properties:
        id: { type: integer }
        postId: { type: integer }
        author: { $ref: "#/components/schemas/Profile" }
        parentId: { type: ["integer", "null"] }
        content: { type: string }
        mediaUrl: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        reactionCount: { type: integer }
        replyCount: { type: integer }
        viewerReaction:
          oneOf:
            - { $ref: "#/components/schemas/ReactionType" }
