          in: query
          description: Start of range (inclusive), ISO date or date-time. Defaults to 30 days ago.
          schema: { type: string }
        - name: to
          in: query
          description: End of range (inclusive day), ISO date or date-time. Defaults to now.
          schema: { type: string }
        - name: level
          in: query
          description: Breakdown dimension.
          schema:
            { type: string, enum: [campaign, adset, ad], default: campaign }
        - { name: campaignId, in: query, schema: { type: integer } }
        - { name: adSetId, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Insights
          content:
