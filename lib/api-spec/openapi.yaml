openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: HiMewo social platform + Messenger API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: posts
  - name: comments
  - name: friends
  - name: messaging
  - name: groups
  - name: pages
  - name: stories
  - name: reels
  - name: notifications
  - name: media
  - name: settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ---------------- Auth ----------------
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user's profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/sync:
    post:
      operationId: syncProfile
      tags: [auth]
      summary: Create or update the app profile for the authenticated Supabase user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileInput"
      responses:
        "200":
          description: Synced profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  # ---------------- Users ----------------
  /users:
    get:
      operationId: searchUsers
      tags: [users]
      summary: Search users
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Profile" }
  /users/suggestions:
    get:
      operationId: getFriendSuggestions
      tags: [users]
      summary: Get people-you-may-know suggestions
      responses:
        "200":
          description: Suggestions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Profile" }
  /users/me:
    patch:
      operationId: updateMyProfile
      tags: [users]
      summary: Update own profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
  /birthdays:
    get:
      operationId: getTodaysBirthdays
      tags: [users]
      summary: Friends whose birthday is today
      responses:
        "200":
          description: Friends with a birthday today
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Profile" }
  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          $ref: "#/components/responses/NotFound"
  /users/{id}/posts:
    get:
      operationId: getUserPosts
      tags: [users]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: cursor, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer, default: 20 } }
      responses:
        "200":
          description: Posts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Post" }
  /users/{id}/friends:
    get:
      operationId: getUserFriends
      tags: [users]
      summary: List a user's friends
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
      responses:
        "200":
          description: Friends
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Profile" }

  # ---------------- Feed & Posts ----------------
  /feed:
    get:
      operationId: getFeed
      tags: [posts]
      summary: Home feed
      parameters:
        - { name: cursor, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer, default: 20 } }
      responses:
        "200":
          description: Feed
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Post" }
  /posts:
    post:
      operationId: createPost
      tags: [posts]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updatePost
      tags: [posts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
    delete:
      operationId: deletePost
      tags: [posts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /posts/{id}/reaction:
    put:
      operationId: setPostReaction
      tags: [posts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReactionInput" }
      responses:
        "200":
          description: Reaction summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReactionSummary" }
    delete:
      operationId: removePostReaction
      tags: [posts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Reaction summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReactionSummary" }
  /posts/{id}/reactions:
    get:
      operationId: listPostReactions
      tags: [posts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Reactions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ReactionUser" }
  /posts/{id}/share:
    post:
      operationId: sharePost
      tags: [posts]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ShareInput" }
      responses:
        "201":
          description: Shared
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Post" }
  /posts/{id}/comments:
    get:
      operationId: listComments
      tags: [comments]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: cursor, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer, default: 30 } }
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Comment" }
    post:
      operationId: createComment
      tags: [comments]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CommentInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }

  # ---------------- Comments ----------------
  /comments/{id}:
    patch:
      operationId: updateComment
      tags: [comments]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CommentUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }
    delete:
      operationId: deleteComment
      tags: [comments]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /comments/{id}/reaction:
    put:
      operationId: setCommentReaction
      tags: [comments]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReactionInput" }
      responses:
        "200":
          description: Updated comment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }
    delete:
      operationId: removeCommentReaction
      tags: [comments]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Updated comment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }

  # ---------------- Friends & Follow ----------------
  /friends:
    get:
      operationId: listFriends
      tags: [friends]
      responses:
        "200":
          description: Friends
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Profile" }
  /friends/requests:
    get:
      operationId: listFriendRequests
      tags: [friends]
      responses:
        "200":
          description: Incoming requests
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FriendRequest" }
    post:
      operationId: sendFriendRequest
      tags: [friends]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FriendRequestInput" }
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FriendRequest" }
  /friends/requests/{id}/accept:
    post:
      operationId: acceptFriendRequest
      tags: [friends]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FriendRequest" }
  /friends/requests/{id}/decline:
    post:
      operationId: declineFriendRequest
      tags: [friends]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Declined
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FriendRequest" }
  /friends/{userId}:
    delete:
      operationId: removeFriend
      tags: [friends]
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Removed }
  /follow/{userId}:
    post:
      operationId: followUser
      tags: [friends]
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Followed }
    delete:
      operationId: unfollowUser
      tags: [friends]
      parameters:
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Unfollowed }

  # ---------------- Messaging ----------------
  /conversations:
    get:
      operationId: listConversations
      tags: [messaging]
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Conversation" }
    post:
      operationId: createConversation
      tags: [messaging]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConversationInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Conversation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateConversation
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConversationUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
  /conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: cursor, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer, default: 30 } }
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Message" }
    post:
      operationId: sendMessage
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MessageInput" }
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }
  /conversations/{id}/read:
    post:
      operationId: markConversationRead
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReadInput" }
      responses:
        "204": { description: Marked read }
  /conversations/{id}/members:
    post:
      operationId: addConversationMembers
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MembersInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
  /conversations/{id}/members/{userId}:
    delete:
      operationId: removeConversationMember
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: userId, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Removed }
  /messages/{id}/reaction:
    put:
      operationId: setMessageReaction
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MessageReactionInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }
    delete:
      operationId: removeMessageReaction
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }
  /messages/{id}:
    delete:
      operationId: deleteMessage
      tags: [messaging]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }

  # ---------------- Groups ----------------
  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      responses:
        "200":
          description: Groups
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Group" }
    post:
      operationId: createGroup
      tags: [groups]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GroupInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Group" }
  /groups/{id}:
    get:
      operationId: getGroup
      tags: [groups]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Group
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Group" }
        "404":
          $ref: "#/components/responses/NotFound"
  /groups/{id}/join:
    post:
      operationId: joinGroup
      tags: [groups]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Joined }
  /groups/{id}/leave:
    delete:
      operationId: leaveGroup
      tags: [groups]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Left }
  /groups/{id}/posts:
    get:
      operationId: getGroupPosts
      tags: [groups]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
        - { name: cursor, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer, default: 20 } }
      responses:
        "200":
          description: Posts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Post" }

  # ---------------- Settings ----------------
  /settings:
    get:
      operationId: getMySettings
      tags: [settings]
      summary: Get the authenticated user's settings & preferences
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserSettings" }
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      operationId: updateMySettings
      tags: [settings]
      summary: Update the authenticated user's settings & preferences
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserSettingsUpdate" }
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserSettings" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------- Saved items ----------------
  /saved:
    get:
      operationId: listSavedItems
      tags: [saved]
      summary: List the authenticated user's saved posts and listings
      responses:
        "200":
          description: Saved items, most recent first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SavedItem" }
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: saveItem
      tags: [saved]
      summary: Save a post or marketplace listing
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SavedItemInput" }
      responses:
        "201":
          description: Saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SavedItem" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /saved/{entityType}/{entityId}:
    delete:
      operationId: unsaveItem
      tags: [saved]
      summary: Remove a saved post or listing
      parameters:
        - { name: entityType, in: path, required: true, schema: { type: string, enum: [post, listing, reel] } }
        - { name: entityId, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Removed }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------------- Marketplace ----------------
  /marketplace:
    get:
      operationId: listMarketplaceListings
      tags: [marketplace]
      parameters:
        - { name: category, in: query, schema: { type: string } }
        - { name: search, in: query, schema: { type: string } }
        - { name: cursor, in: query, schema: { type: integer, minimum: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 20, minimum: 1, maximum: 50 } }
      responses:
        "200":
          description: Listings
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MarketplaceListing" }
        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      operationId: createMarketplaceListing
      tags: [marketplace]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MarketplaceListingInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MarketplaceListing" }
        "400":
          $ref: "#/components/responses/BadRequest"
  /marketplace/selling:
    get:
      operationId: getSellingDashboard
      tags: [marketplace]
      responses:
        "200":
          description: Selling overview
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SellingOverview" }
  /marketplace/{id}:
    get:
      operationId: getMarketplaceListing
      tags: [marketplace]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Listing
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MarketplaceListing" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateMarketplaceListing
      tags: [marketplace]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MarketplaceListingUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MarketplaceListing" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteMarketplaceListing
      tags: [marketplace]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------- Pages ----------------
  /pages:
    get:
      operationId: listPages
