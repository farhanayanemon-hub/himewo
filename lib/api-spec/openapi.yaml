        numeric fields are zero so clients can hide the feature entirely.
      responses:
        "200":
          description: Earnings summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EarningsSummary" }
        "401":
          $ref: "#/components/responses/Unauthorized"
