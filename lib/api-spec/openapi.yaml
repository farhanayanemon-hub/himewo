        title: { type: string, minLength: 1, maxLength: 120 }

    Story:
      type: object
      required: [id, author, storyType, createdAt, expiresAt, viewCount, viewerHasViewed]
      properties:
        id: { type: integer }
        author: { $ref: "#/components/schemas/Profile" }
        storyType: { type: string, enum: [media, text] }
        mediaUrl: { type: ["string", "null"] }
        mediaType:
          oneOf:
            - { type: string, enum: [image, video] }
            - { type: "null" }
        caption: { type: ["string", "null"] }
        textContent: { type: ["string", "null"] }
        backgroundStyle: { type: ["string", "null"] }
        musicUrl: { type: ["string", "null"] }
        musicTitle: { type: ["string", "null"] }
        musicArtist: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        viewCount: { type: integer }
        viewerHasViewed: { type: boolean }
    StoryInput:
      type: object
      properties:
        storyType: { type: string, enum: [media, text], default: media }
        mediaUrl: { type: string }
        mediaType: { type: string, enum: [image, video] }
        caption: { type: string }
        textContent: { type: string }
        backgroundStyle: { type: string }
        musicUrl: { type: string }
        musicTitle: { type: string }
        musicArtist: { type: string }
        expiresInHours: { type: integer }
    MusicTrack:
      type: object
      required: [id, title, url, source]
      properties:
        id: { type: integer }
        title: { type: string }
        artist: { type: ["string", "null"] }
        url: { type: string }
        mood: { type: ["string", "null"] }
        source: { type: string, enum: [library, upload] }
    MusicTrackInput:
      type: object
      required: [title, url]
      properties:
        title: { type: string }
        artist: { type: string }
        url: { type: string }
    StoryGroup:
      type: object
      required: [author, stories, hasUnseen]
      properties:
        author: { $ref: "#/components/schemas/Profile" }
        stories:
          type: array
          items: { $ref: "#/components/schemas/Story" }
        hasUnseen: { type: boolean }

    Reel:
      type: object
      required: [id, author, videoUrl, createdAt, likeCount, commentCount, viewerHasLiked, viewerHasSaved]
      properties:
        id: { type: integer }
        author: { $ref: "#/components/schemas/Profile" }
        videoUrl: { type: string }
        thumbnailUrl: { type: ["string", "null"] }
        caption: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        likeCount: { type: integer }
        commentCount: { type: integer }
        viewerHasLiked: { type: boolean }
        viewerHasSaved: { type: boolean }
        viewerReaction:
          oneOf:
            - $ref: "#/components/schemas/ReactionType"
            - type: "null"
    ReelInput:
      type: object
      required: [videoUrl]
      properties:
        videoUrl: { type: string }
        thumbnailUrl: { type: string }
        caption: { type: string }
    ReelComment:
      type: object
      required: [id, reelId, author, content, createdAt]
      properties:
        id: { type: integer }
        reelId: { type: integer }
        author: { $ref: "#/components/schemas/Profile" }
        content: { type: string }
        createdAt: { type: string, format: date-time }
    ReelCommentInput:
      type: object
      required: [content]
      properties:
        content: { type: string }

    Notification:
      type: object
      required: [id, type, isRead, createdAt]
      properties:
        id: { type: integer }
        type:
          type: string
          enum: [reaction, comment, friend_request, friend_accept, follow, message, group_invite, page_follow, mention, share, story_view]
        actor:
          oneOf:
            - { $ref: "#/components/schemas/Profile" }
            - { type: "null" }
        entityType: { type: ["string", "null"] }
        entityId: { type: ["integer", "null"] }
        isRead: { type: boolean }
        createdAt: { type: string, format: date-time }
    UnreadCount:
      type: object
      required: [count]
      properties:
        count: { type: integer }

    UploadUrlInput:
      type: object
      required: [fileName, contentType]
      properties:
        fileName: { type: string }
        contentType: { type: string }
        bucket: { type: string }
    UploadUrlResponse:
      type: object
      required: [uploadUrl, publicUrl, path]
      properties:
        uploadUrl: { type: string }
        publicUrl: { type: string }
        path: { type: string }
        token: { type: ["string", "null"] }

    # ---------------- Earnings ----------------
    EarningsRewards:
      type: object
      required: [post, like, comment, share]
      properties:
        post: { type: integer }
        like: { type: integer }
        comment: { type: integer }
        share: { type: integer }
    EarningsSummary:
      type: object
      required:
        [
          enabled,
          balancePoints,
          balanceDollars,
          pointsPerDollar,
          minWithdrawDollars,
          todayPoints,
          monthPoints,
          totalEarnedPoints,
          pendingWithdrawalDollars,
          rewards,
        ]
      properties:
        enabled: { type: boolean }
        balancePoints: { type: integer }
        balanceDollars: { type: number }
        pointsPerDollar: { type: integer }
        minWithdrawDollars: { type: integer }
        dailyPointCap: { type: integer }
        todayPoints: { type: integer }
        monthPoints: { type: integer }
        totalEarnedPoints: { type: integer }
        pendingWithdrawalDollars: { type: number }
        rewards: { $ref: "#/components/schemas/EarningsRewards" }
    PointTransaction:
      type: object
      required: [id, action, points, createdAt]
      properties:
        id: { type: integer }
        action: { type: string }
        points: { type: integer }
        entityType: { type: ["string", "null"] }
        entityId: { type: ["integer", "null"] }
        note: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
    WithdrawalAccount:
      type: object
      required: [id, method, details, createdAt]
      properties:
        id: { type: integer }
        method:
          type: string
          enum: [paypal, binance, wise, bybit, bkash, nagad]
        label: { type: ["string", "null"] }
        details:
          type: object
          additionalProperties: { type: string }
        createdAt: { type: string, format: date-time }
    WithdrawalAccountInput:
      type: object
      required: [method, details]
      properties:
        method:
          type: string
          enum: [paypal, binance, wise, bybit, bkash, nagad]
        label: { type: string }
        details:
          type: object
          additionalProperties: { type: string }
    WithdrawalRequest:
      type: object
      required:
        [id, amountDollars, pointsSpent, method, details, status, createdAt]
      properties:
        id: { type: integer }
        amountDollars: { type: integer }
        pointsSpent: { type: integer }
        method: { type: string }
        details:
          type: object
          additionalProperties: { type: string }
        status: { type: string, enum: [pending, approved, paid, rejected] }
        adminNote: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        processedAt: { type: ["string", "null"], format: date-time }
    WithdrawalRequestInput:
      type: object
      required: [amountDollars, accountId]
      properties:
        amountDollars: { type: integer, minimum: 1 }
        accountId: { type: integer }
    AdminWithdrawalRequest:
      type: object
      required:
        [id, userId, amountDollars, pointsSpent, method, details, status, createdAt]
      properties:
        id: { type: integer }
        userId: { type: string }
        amountDollars: { type: integer }
        pointsSpent: { type: integer }
        method: { type: string }
        details:
          type: object
          additionalProperties: { type: string }
        status: { type: string, enum: [pending, approved, paid, rejected] }
        adminNote: { type: ["string", "null"] }
        processedBy: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        processedAt: { type: ["string", "null"], format: date-time }
        user:
          oneOf:
            - { $ref: "#/components/schemas/Profile" }
            - { type: "null" }
    PointConfig:
      type: object
      required:
        [
          enabled,
          pointsPerPost,
          pointsPerLike,
          pointsPerComment,
          pointsPerShare,
          pointsPerDollar,
          minWithdrawDollars,
          dailyPointCap,
        ]
      properties:
        enabled: { type: boolean }
        pointsPerPost: { type: integer }
        pointsPerLike: { type: integer }
        pointsPerComment: { type: integer }
        pointsPerShare: { type: integer }
        pointsPerDollar: { type: integer }
        minWithdrawDollars: { type: integer }
        dailyPointCap: { type: integer }
        updatedAt: { type: ["string", "null"], format: date-time }
    PointConfigUpdate:
      type: object
      properties:
        enabled: { type: boolean }
        pointsPerPost: { type: integer, minimum: 0 }
        pointsPerLike: { type: integer, minimum: 0 }
        pointsPerComment: { type: integer, minimum: 0 }
        pointsPerShare: { type: integer, minimum: 0 }
        pointsPerDollar: { type: integer, minimum: 1 }
        minWithdrawDollars: { type: integer, minimum: 1 }
        dailyPointCap: { type: integer, minimum: 0 }
    ProcessWithdrawalInput:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [approved, paid, rejected] }
        adminNote: { type: string }
    AdjustPointsInput:
      type: object
      required: [points]
      properties:
        points: { type: integer }
        note: { type: string }
    AdjustPointsResult:
      type: object
      required: [balancePoints, balanceDollars]
      properties:
        balancePoints: { type: integer }
        balanceDollars: { type: number }
    AdminEarningsSummary:
      type: object
      required:
        [
          totalPaidDollars,
          pendingPayoutDollars,
          pendingPayoutCount,
          outstandingPoints,
          outstandingDollars,
        ]
      properties:
        totalPaidDollars:
          type: number
          description: Sum of amounts for withdrawals marked paid.
        pendingPayoutDollars:
          type: number
          description: Sum of amounts requested but not yet paid (pending + approved).
        pendingPayoutCount:
          type: integer
          description: Number of withdrawal requests awaiting payout (pending + approved).
        outstandingPoints:
          type: integer
          description: Total points held across all user balances (positive balances only).
        outstandingDollars:
          type: number
          description: USD value of outstanding points at the current conversion rate.
